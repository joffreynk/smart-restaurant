; PlatformIO Project Configuration File
; ESP32 Waiter Robot Firmware
; Build: HTTP polling version

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = 
    default
    colorize
    time

; Source directory (project root)
src_dir = .

; Build flags
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -w  ; suppress warnings (optional)

; No additional libraries required for HTTP polling version
; (ArduinoJson, WebSockets not needed)
